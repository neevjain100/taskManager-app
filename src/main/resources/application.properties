# ==========================
# Application
# ==========================
spring.application.name=taskmanager
server.port=8081

# ==========================
# Actuator
# ==========================
management.server.port=9090
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoints.web.base-path=/actuator
management.info.env.enabled=true

# ==========================
# Graphite Metrics Export
# ==========================
management.graphite.metrics.export.enabled=true
management.graphite.metrics.export.host=graphite
management.graphite.metrics.export.port=2003
management.graphite.metrics.export.protocol=plaintext
management.graphite.metrics.export.step=10s

# Metric Tags
management.metrics.tags.application=taskmanager