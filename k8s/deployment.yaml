apiVersion: apps/v1
kind: Deployment

metadata:
  name: task-manager

spec:
  replicas: 2

  selector:
    matchLabels:
      app: task-manager

  template:
    metadata:
      labels:
        app: task-manager

    spec:
      containers:
        - name: task-manager

          image: task-manager:v2

          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8081
            - containerPort: 9090