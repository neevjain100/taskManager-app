apiVersion: apps/v1
kind: Deployment
metadata:
  name: graphite
spec:
  replicas: 1
  selector:
    matchLabels:
      app: graphite
  template:
    metadata:
      labels:
        app: graphite
    spec:
      containers:
        - name: graphite
          image: graphiteapp/graphite-statsd
          ports:
            - containerPort: 80
            - containerPort: 2003
---
apiVersion: v1
kind: Service
metadata:
  name: graphite
spec:
  type: NodePort
  selector:
    app: graphite
  ports:
    - name: web
      port: 80
      targetPort: 80
      nodePort: 30080
    - name: carbon
      port: 2003
      targetPort: 2003
      nodePort: 30003